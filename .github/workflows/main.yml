name: Build WDA IPA
on: [workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      # 升級為 v4
      - uses: actions/checkout@v4
        
      - name: Build unsigned WDA
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Package IPA
        run: |
          mkdir -p Payload
          # 如果路徑略有不同，先強制確保編譯產出存在再複製
          cp -r build/Release-iphoneos/WebDriverAgentRunner-Runner.app Payload/
          zip -r WebDriverAgentRunner.ipa Payload
          
      # 升級為 v4
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner
          path: WebDriverAgentRunner.ipa

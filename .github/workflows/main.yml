name: Build WDA IPA
on: [workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Build unsigned WDA
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Package IPA
        run: |
          mkdir -p Payload
          # 動態搜尋整個主機，找出剛剛熱騰騰編譯完的 WebDriverAgentRunner-Runner.app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "WebDriverAgentRunner-Runner.app" -type d | head -n 1)
          
          # 將找到的 app 複製進 Payload 資料夾
          cp -r "$APP_PATH" Payload/
          
          # 打包並壓縮成 ipa
          zip -r WebDriverAgentRunner.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner
          path: WebDriverAgentRunner.ipa
